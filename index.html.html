<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广东华夏高级技工学校 — 招生名额查询</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2d5a;
    --blue: #1e4fa3;
    --light-blue: #3a7bd5;
    --accent: #d4a843;
    --pale: #eef3fb;
    --white: #ffffff;
    --gray: #f5f7fa;
    --text: #1c2438;
    --muted: #6b7a99;
    --border: #dde5f4;
    --red: #c0392b;
    --green: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #f0f4fb;
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(26,45,90,0.35);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .school-logo {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.35);
    object-fit: cover;
    flex-shrink: 0;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 校标图片样式优化 */
  .school-logo img { 
    width: 100%; 
    height: 100%; 
    object-fit: contain;
  }

  .school-info h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.2;
  }

  .school-info p {
    font-size: 0.82rem;
    opacity: 0.75;
    margin-top: 3px;
    letter-spacing: 0.08em;
  }

  .header-badge {
    display: none;
    margin-left: auto;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    padding: 8px 16px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: white;
    font-size: 0.82rem;
  }
  .header-badge:hover { background: rgba(255,255,255,0.22); }
  .header-badge .icon { font-size: 1.3rem; display: block; margin-bottom: 2px; }

  /* ── Hero Banner ── */
  .hero {
    background: linear-gradient(180deg, var(--navy) 0%, var(--blue) 60%, #eef3fb 100%);
    padding: 48px 32px 80px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  .hero h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 10px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .hero p {
    font-size: 0.95rem;
    opacity: 0.82;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ── Main Content ── */
  .main {
    max-width: 1100px;
    margin: -40px auto 60px;
    padding: 0 24px;
    position: relative;
    z-index: 10;
  }

  /* ── Tab Switch ── */
  .tab-bar {
    display: flex;
    background: white;
    border-radius: 14px 14px 0 0;
    box-shadow: 0 2px 12px rgba(26,45,90,0.1);
    overflow: hidden;
    border-bottom: 3px solid var(--pale);
  }

  .tab-btn {
    flex: 1;
    padding: 18px 24px;
    border: none;
    background: white;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
  }

  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 0; right: 0;
    height: 3px;
    background: var(--light-blue);
    transform: scaleX(0);
    transition: transform 0.25s;
  }

  .tab-btn.active {
    color: var(--blue);
    background: var(--pale);
    font-weight: 700;
  }

  .tab-btn.active::after { transform: scaleX(1); }

  .tab-tag {
    background: var(--blue);
    color: white;
    font-size: 0.7rem;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 700;
  }

  .tab-btn.active .tab-tag { background: var(--accent); }

  /* ── Card Panel ── */
  .card {
    background: white;
    border-radius: 0 0 14px 14px;
    box-shadow: 0 8px 32px rgba(26,45,90,0.1);
    padding: 36px;
  }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Program Grid ── */
  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    color: var(--navy);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 20px;
    background: linear-gradient(var(--blue), var(--light-blue));
    border-radius: 2px;
  }

  .program-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 30px;
  }

  .prog-btn {
    border: 2px solid var(--border);
    background: var(--gray);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
    position: relative;
  }

  .prog-btn:hover {
    border-color: var(--light-blue);
    background: var(--pale);
    color: var(--blue);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(30,79,163,0.12);
  }

  .prog-btn.selected {
    border-color: var(--blue);
    background: linear-gradient(135deg, var(--pale), #dce8fa);
    color: var(--blue);
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(30,79,163,0.18);
  }

  .prog-btn.selected::after {
    content: '✓';
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 0.75rem;
    color: var(--light-blue);
    font-weight: 900;
  }

  .prog-num {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 3px;
  }

  /* ── Query Button ── */
  .query-area {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .selected-label {
    flex: 1;
    min-width: 200px;
    background: var(--pale);
    border: 1.5px dashed var(--light-blue);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.9rem;
    color: var(--blue);
    min-height: 48px;
    display: flex;
    align-items: center;
  }

  .selected-label.empty { color: var(--muted); font-style: italic; }

  .query-btn {
    background: linear-gradient(135deg, var(--blue), var(--light-blue));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(30,79,163,0.3);
    letter-spacing: 0.05em;
  }

  .query-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(30,79,163,0.4);
  }

  .query-btn:active { transform: translateY(0); }
  .query-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Result Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 50, 0.55);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: white;
    border-radius: 20px;
    padding: 40px;
    max-width: 440px;
    width: 90%;
    text-align: center;
    box-shadow: 0 24px 80px rgba(26,45,90,0.3);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    font-size: 1.4rem;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
  }

  .modal-icon { font-size: 3rem; margin-bottom: 12px; }

  .modal-program {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .modal-type {
    background: var(--pale);
    color: var(--blue);
    border-radius: 20px;
    display: inline-block;
    padding: 3px 12px;
    font-size: 0.78rem;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .modal-h { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; color: var(--navy); margin-bottom: 6px; }

  .quota-display {
    font-family: 'Noto Serif SC', serif;
    font-size: 4rem;
    font-weight: 700;
    line-height: 1;
    margin: 16px 0 8px;
    background: linear-gradient(135deg, var(--blue), var(--light-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .quota-display.low { background: linear-gradient(135deg, #e67e22, var(--red)); -webkit-background-clip: text; background-clip: text; }
  .quota-display.full { background: linear-gradient(135deg, #95a5a6, #7f8c8d); -webkit-background-clip: text; background-clip: text; }

  .quota-unit { font-size: 0.9rem; color: var(--muted); margin-bottom: 20px; }

  .quota-bar-wrap {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .quota-bar {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--blue), var(--light-blue));
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .quota-bar.low { background: linear-gradient(90deg, #e67e22, var(--red)); }

  .modal-stats {
    display: flex;
    gap: 16px;
    background: var(--gray);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 20px;
    text-align: left;
  }

  .stat-item { flex: 1; }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; }
  .stat-value { font-size: 1rem; font-weight: 700; color: var(--navy); }

  .modal-close-btn {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
  }

  .modal-close-btn:hover { background: var(--blue); }

  /* ── Admin Panel ── */
  .admin-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,20,50,0.6);
    backdrop-filter: blur(8px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .admin-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

  .admin-panel {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 700px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 32px 100px rgba(26,45,90,0.4);
  }

  .admin-header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    padding: 24px 32px;
    border-radius: 20px 20px 0 0;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .admin-header h3 { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; }
  .admin-header p { font-size: 0.8rem; opacity: 0.75; margin-top: 3px; }

  .admin-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .admin-close:hover { background: rgba(255,255,255,0.3); }

  /* Login */
  .admin-login {
    padding: 48px 40px;
    text-align: center;
  }

  .admin-login h4 { font-family: 'Noto Serif SC', serif; font-size: 1.3rem; color: var(--navy); margin-bottom: 8px; }
  .admin-login p { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .login-field input {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-field input:focus { border-color: var(--light-blue); }

  .login-btn {
    background: linear-gradient(135deg, var(--blue), var(--light-blue));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }

  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,79,163,0.3); }

  .login-err {
    color: var(--red);
    font-size: 0.85rem;
    margin-top: 10px;
    display: none;
  }

  /* Admin content */
  .admin-content { display: none; padding: 28px; }
  .admin-content.show { display: block; }

  .admin-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--gray);
    padding: 6px;
    border-radius: 10px;
  }

  .admin-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.88rem;
    color: var(--muted);
    font-weight: 500;
    transition: all 0.2s;
  }

  .admin-tab.active { background: white; color: var(--blue); font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
  }

  .admin-table th {
    background: var(--pale);
    color: var(--navy);
    font-size: 0.82rem;
    font-weight: 700;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }

  .admin-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    vertical-align: middle;
  }

  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: var(--gray); }

  .quota-input {
    width: 80px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.9rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .quota-input:focus { border-color: var(--light-blue); }

  .save-row-btn {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .save-row-btn:hover { background: #229954; }

  .save-all-btn {
    background: linear-gradient(135deg, var(--blue), var(--light-blue));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px 32px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    width: 100%;
    transition: all 0.2s;
  }

  .save-all-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,79,163,0.3); }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: white;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 0.9rem;
    font-weight: 500;
    box-shadow: 0 8px 30px rgba(26,45,90,0.35);
    z-index: 9999;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 600px) {
    .header-inner { padding: 14px 18px; gap: 12px; }
    .school-info h1 { font-size: 1.1rem; }
    .hero { padding: 32px 20px 64px; }
    .hero h2 { font-size: 1.4rem; }
    .main { padding: 0 12px; }
    .card { padding: 20px 16px; }
    .program-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .admin-panel { max-height: 95vh; }
    .admin-login { padding: 28px 20px; }
    .admin-content { padding: 16px; }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-inner">
    <div class="school-logo">
      <!-- 替换为真实校标图片 -->
      <img src="https://p3-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/6657714ee3454e6eac7c141704aab585.jpg~tplv-a9rns2rl98-24:720:720.jpg?lk3s=8e244e95&rcl=202604272155580C91A12C72B4D0EDE5B0&rrcfp=8a172a1a&x-expires=1777902959&x-signature=ue%2B0iu%2FGBOiHPslfYA5yQ%2BeKcoM%3D" alt="广东华夏高级技工学校校标">
    </div>
    <div class="school-info">
      <h1>广东华夏高级技工学校</h1>
      <p>Guangdong Hua Xia Senior Technical School</p>
    </div>
    <!-- 已隐藏管理员入口按钮 -->
    <!--
    <a class="header-badge" onclick="openAdmin()">
      <span class="icon">🔐</span>
      管理员入口
    </a>
    -->
  </div>
</header>

<!-- ── HERO ── -->
<div class="hero">
  <h2>招生名额查询系统</h2>
  <p>选择报读班型与专业方向，即时查询当前剩余招生名额</p>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('cert')">
      📋 <span>3+证书班</span>
      <span class="tab-tag">21专业</span>
    </button>
    <button class="tab-btn" onclick="switchTab('tech')">
      🎓 <span>三年制中技</span>
      <span class="tab-tag">23专业</span>
    </button>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- 3+证书班 Panel -->
    <div class="panel active" id="panel-cert">
      <div class="section-title">请选择报读专业（方向）</div>
      <div class="program-grid" id="grid-cert"></div>
      <div class="query-area">
        <div class="selected-label empty" id="label-cert">请点击上方专业按钮进行选择</div>
        <button class="query-btn" id="qbtn-cert" disabled onclick="queryQuota('cert')">查询名额</button>
      </div>
    </div>

    <!-- 三年制中技 Panel -->
    <div class="panel" id="panel-tech">
      <div class="section-title">请选择报读专业（方向）</div>
      <div class="program-grid" id="grid-tech"></div>
      <div class="query-area">
        <div class="selected-label empty" id="label-tech">请点击上方专业按钮进行选择</div>
        <button class="query-btn" id="qbtn-tech" disabled onclick="queryQuota('tech')">查询名额</button>
      </div>
    </div>

  </div>
</div>

<!-- ── RESULT MODAL ── -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-icon" id="m-icon">📊</div>
    <div class="modal-program" id="m-type"></div>
    <div class="modal-h" id="m-name"></div>
    <div class="quota-display" id="m-quota">—</div>
    <div class="quota-unit">个剩余招生名额</div>
    <div class="quota-bar-wrap">
      <div class="quota-bar" id="m-bar" style="width:0%"></div>
    </div>
    <div class="modal-stats">
      <div class="stat-item">
        <div class="stat-label">招生计划总数</div>
        <div class="stat-value" id="m-total">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">已录取人数</div>
        <div class="stat-value" id="m-taken">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">剩余名额</div>
        <div class="stat-value" id="m-left">—</div>
      </div>
    </div>
    <button class="modal-close-btn" onclick="closeModal()">关闭</button>
  </div>
</div>

<!-- ── ADMIN OVERLAY ── -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-header">
      <div>
             <h3>🔐 管理员后台</h3>
        <p>招生名额编辑系统</p>
      </div>
      <button class="admin-close" onclick="closeAdmin()">✕</button>
    </div>

    <!-- Login -->
    <div class="admin-login" id="adminLogin">
      <h4>管理员登录</h4>
      <p>请输入管理员账号与密码</p>
      <div class="login-field">
        <input type="text" id="adminUser" placeholder="账号" />
        <input type="password" id="adminPass" placeholder="密码" />
      </div>
      <button class="login-btn" onclick="doLogin()">登录</button>
      <div class="login-err" id="loginErr">账号或密码错误，请重试</div>
    </div>

    <!-- Admin Content -->
    <div class="admin-content" id="adminContent">
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('cert', this)">3+证书班</button>
        <button class="admin-tab" onclick="switchAdminTab('tech', this)">三年制中技</button>
      </div>
      <div id="admin-table-wrap"></div>
      <button class="save-all-btn" onclick="saveAll()">💾 保存全部修改</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const programs = {
  cert: [
    { id:'c1', name:'电子商务', plan:80 },
    { id:'c2', name:'休闲体育服务（高尔夫运动与管理方向）', plan:40 },
    { id:'c3', name:'美容保健', plan:50 },
    { id:'c4', name:'护理', plan:50 },
    { id:'c5', name:'形象设计与健康管理', plan:50 },
    { id:'c6', name:'口腔医学技术', plan:50 },
    { id:'c7', name:'室内设计', plan:40 },
    { id:'c8', name:'动漫（画）设计与制作', plan:80 },
    { id:'c9', name:'幼儿教育', plan:40 },
    { id:'c10', name:'* 数字媒体艺术', plan:50 },
    { id:'c11', name:'计算机程序设计', plan:40 },
    { id:'c12', name:'计算机网络应用', plan:40 },
    { id:'c13', name:'新媒体与互联网应用', plan:50 },
    { id:'c14', name:'新能源汽车检测与维修', plan:50 },
    { id:'c15', name:'机电一体化技术', plan:50 },
    { id:'c16', name:'工业机器人应用与维护', plan:50 },
    { id:'c17', name:'烹饪（中式烹调）', plan:50 },
    { id:'c18', name:'烹饪（中西式面点）', plan:50 },
    { id:'c19', name:'* 药膳与食疗', plan:50 },
    { id:'c20', name:'* 粤菜烹饪', plan:40 },
    { id:'c21', name:'* 汽车维修', plan:50 },
  ],
  tech: [
    { id:'t1', name:'电子商务', plan:50 },
    { id:'t2', name:'休闲体育服务（高尔夫运动与管理方向）', plan:40 },
    { id:'t3', name:'美容保健（瑞颜生物订单班）', plan:50 },
    { id:'t4', name:'护理', plan:50 },
    { id:'t5', name:'形象设计与健康管理', plan:50 },
    { id:'t6', name:'形象设计与健康管理（美容美发方向）', plan:50 },
    { id:'t7', name:'口腔医学技术', plan:50 },
    { id:'t8', name:'室内设计', plan:40 },
    { id:'t9', name:'动漫（画）设计与制作', plan:50 },
    { id:'t10', name:'幼儿教育', plan:40 },
    { id:'t11', name:'* 数字媒体艺术', plan:50 },
    { id:'t12', name:'计算机程序设计', plan:40 },
    { id:'t13', name:'计算机网络应用', plan:40 },
    { id:'t14', name:'新媒体与互联网应用', plan:50 },
    { id:'t15', name:'新能源汽车检测与维修', plan:80 },
    { id:'t16', name:'机电一体化技术', plan:80 },
    { id:'t17', name:'机电一体化技术（无人机维修方向）（百沃科技订单班）', plan:50 },
    { id:'t18', name:'工业机器人应用与维护', plan:50 },
    { id:'t19', name:'烹饪（中式烹调）（珠海长隆订单班）', plan:50 },
    { id:'t20', name:'烹饪（中西式面点）（珠海长隆订单班）', plan:80 },
    { id:'t21', name:'* 粤菜烹饪', plan:40 },
    { id:'t22', name:'* 药膳与食疗', plan:40 },
    { id:'t23', name:'* 汽车维修', plan:50 },
  ]
};

// Default quota: remaining = plan (no one enrolled yet) — stored in localStorage
function getKey(type) { return 'hx_quota_' + type; }

function loadQuotas(type) {
  const stored = localStorage.getItem(getKey(type));
  if (stored) return JSON.parse(stored);
  // Default: remaining = plan count
  const defaults = {};
  programs[type].forEach(p => { defaults[p.id] = p.plan; });
  return defaults;
}

function saveQuotas(type, data) {
  localStorage.setItem(getKey(type), JSON.stringify(data));
}

let quotas = {
  cert: loadQuotas('cert'),
  tech: loadQuotas('tech'),
};

// ── STATE ──
let currentTab = 'cert';
let selected = { cert: null, tech: null };
let adminLoggedIn = false;
let adminCurrentTab = 'cert';

// ── BUILD GRIDS ──
function buildGrids() {
  ['cert','tech'].forEach(type => {
    const grid = document.getElementById('grid-' + type);
    grid.innerHTML = '';
    programs[type].forEach((p, i) => {
      const btn = document.createElement('button');
      btn.className = 'prog-btn';
      btn.id = 'pb-' + p.id;
      btn.innerHTML = `<span class="prog-num">No.${i+1}</span>${p.name}`;
      btn.onclick = () => selectProg(type, p.id);
      grid.appendChild(btn);
    });
  });
}

function selectProg(type, id) {
  // Deselect previous
  if (selected[type]) {
    const prev = document.getElementById('pb-' + selected[type]);
    if (prev) prev.classList.remove('selected');
  }
  selected[type] = id;
  document.getElementById('pb-' + id).classList.add('selected');

  const prog = programs[type].find(p => p.id === id);
  const label = document.getElementById('label-' + type);
  label.textContent = '已选择：' + prog.name;
  label.classList.remove('empty');
  document.getElementById('qbtn-' + type).disabled = false;
}

// ── TAB SWITCH ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'cert') || (i === 1 && tab === 'tech'));
  });
  document.getElementById('panel-cert').classList.toggle('active', tab === 'cert');
  document.getElementById('panel-tech').classList.toggle('active', tab === 'tech');
}

// ── QUERY ──
function queryQuota(type) {
  const id = selected[type];
  if (!id) return;
  const prog = programs[type].find(p => p.id === id);
  const remaining = quotas[type][id] ?? prog.plan;
  const taken = prog.plan - remaining;
  const pct = Math.max(0, Math.min(100, (remaining / prog.plan) * 100));

  const isLow = remaining <= Math.floor(prog.plan * 0.2);
  const isFull = remaining <= 0;

  document.getElementById('m-icon').textContent = isFull ? '🚫' : isLow ? '⚠️' : '✅';
  document.getElementById('m-type').textContent = type === 'cert' ? '3+证书班 · 招生计划查询' : '三年制中技 · 招生计划查询';
  document.getElementById('m-name').textContent = prog.name;

  const qEl = document.getElementById('m-quota');
  qEl.textContent = isFull ? '已满' : remaining;
  qEl.className = 'quota-display' + (isFull ? ' full' : isLow ? ' low' : '');

  document.getElementById('m-total').textContent = prog.plan + ' 人';
  document.getElementById('m-taken').textContent = taken + ' 人';
  document.getElementById('m-left').textContent = isFull ? '名额已满' : remaining + ' 人';

  const bar = document.getElementById('m-bar');
  bar.style.width = '0%';
  bar.className = 'quota-bar' + (isLow ? ' low' : '');

  document.getElementById('resultModal').classList.add('show');
  setTimeout(() => { bar.style.width = pct + '%'; }, 50);
}

function closeModal() {
  document.getElementById('resultModal').classList.remove('show');
}

// Click outside modal to close
document.getElementById('resultModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── ADMIN ──
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'huaxia2024';

function openAdmin() {
  document.getElementById('adminOverlay').classList.add('show');
  if (adminLoggedIn) showAdminContent();
}

function closeAdmin() {
  document.getElementById('adminOverlay').classList.remove('show');
}

document.getElementById('adminOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAdmin();
});

function doLogin() {
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    adminLoggedIn = true;
    showAdminContent();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function showAdminContent() {
  document.getElementById('adminLogin').style.display = 'none';
  document.getElementById('adminContent').classList.add('show');
  renderAdminTable(adminCurrentTab);
}

function switchAdminTab(type, el) {
  adminCurrentTab = type;
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAdminTable(type);
}

function renderAdminTable(type) {
  const wrap = document.getElementById('admin-table-wrap');
  const label = type === 'cert' ? '3+证书班' : '三年制中技';
  let html = `<table class="admin-table">
    <thead><tr>
      <th>序号</th>
      <th>专业名称</th>
      <th>计划总数</th>
      <th>剩余名额</th>
      <th>操作</th>
    </tr></thead><tbody>`;

  programs[type].forEach((p, i) => {
    const rem = quotas[type][p.id] ?? p.plan;
    html += `<tr>
      <td>${i+1}</td>
      <td style="max-width:200px;line-height:1.3">${p.name}</td>
      <td>${p.plan}</td>
      <td><input class="quota-input" type="number" min="0" max="${p.plan}" value="${rem}" id="qi-${p.id}" /></td>
      <td><button class="save-row-btn" onclick="saveRow('${type}','${p.id}')">保存</button></td>
    </tr>`;
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function saveRow(type, id) {
  const input = document.getElementById('qi-' + id);
  const prog = programs[type].find(p => p.id === id);
  let val = parseInt(input.value);
  if (isNaN(val) || val < 0) val = 0;
  if (val > prog.plan) val = prog.plan;
  input.value = val;
  quotas[type][id] = val;
  saveQuotas(type, quotas[type]);
  showToast('✅ 已保存：' + prog.name + ' → ' + val + ' 人');
}

function saveAll() {
  const type = adminCurrentTab;
  programs[type].forEach(p => {
    const input = document.getElementById('qi-' + p.id);
    if (input) {
      let val = parseInt(input.value);
      if (isNaN(val) || val < 0) val = 0;
      if (val > p.plan) val = p.plan;
      input.value = val;
      quotas[type][p.id] = val;
    }
  });
  saveQuotas(type, quotas[type]);
  showToast('💾 全部保存成功！');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Enter key for login
document.getElementById('adminPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// 秘密入口：连续按 5 次 M 键 打开管理员后台
let mPressCount = 0;
document.addEventListener('keydown', function(e){
  if(e.key.toLowerCase() === 'm'){
    mPressCount++;
    if(mPressCount >= 5){
      mPressCount = 0;
      openAdmin();
    }
  }else{
    mPressCount = 0;
  }
});

// 新增：手机触屏版管理员入口（空白处连续点击5次）
let clickCount = 0;
let clickTimer = null;
document.addEventListener('click', function(e) {
  // 排除按钮、输入框等可点击元素，只响应空白处点击
  const ignoreTags = ['BUTTON', 'INPUT', 'SELECT', 'TEXTAREA', 'A'];
  if (!ignoreTags.includes(e.target.tagName) && !e.target.closest('.prog-btn, .tab-btn, .query-btn, .modal, .admin-panel')) {
    clickCount++;
    // 重置计时器（5秒内点击5次有效）
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
      clickCount = 0;
    }, 5000);
    
    if (clickCount >= 5) {
      clickCount = 0;
      clearTimeout(clickTimer);
      openAdmin();
    }
  }
});

// ── INIT ──
buildGrids();
</script>
</body>
</html>
